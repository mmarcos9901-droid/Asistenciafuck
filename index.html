<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App de Asistencia</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #eef2f5;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .controls {
            width: 100%;
            max-width: 800px;
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .controls input[type="month"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }
        .btn-export {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-export:hover {
            background-color: #218838;
        }
        #document-container {
            background: white;
            padding: 30px 20px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            margin-top: 0;
            color: #333;
            text-transform: uppercase;
            font-size: 20px;
        }
        .header-info {
            margin-bottom: 20px;
            font-size: 15px;
            line-height: 1.6;
        }
        .header-info strong {
            display: inline-block;
            width: 80px;
        }
        /* Estilos de inputs invisibles para que parezca Word */
        input.clean-input, select.clean-input {
            border: none;
            border-bottom: 1px dashed transparent;
            background: transparent;
            font-size: 15px;
            font-family: inherit;
            color: #333;
            width: calc(100% - 90px);
            outline: none;
        }
        input.clean-input:focus, input.clean-input:hover, select.clean-input:focus, select.clean-input:hover {
            border-bottom: 1px dashed #ccc;
            background: #f9f9f9;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            border: 1px solid #000;
            padding: 6px;
            text-align: left;
        }
        th {
            background-color: #f0f0f0;
        }
        td input, td select {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 14px;
            font-family: inherit;
            outline: none;
        }
        td input:hover, td select:hover {
            background: #f9f9f9;
        }
        .weekend {
            background-color: #fafafa;
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="controls">
        <input type="month" id="monthPicker" onchange="generateTable()">
        <button class="btn-export" onclick="exportToImage()">Exportar Imagen</button>
    </div>

    <div id="document-container">
        <h2>Registro de Asistencia y Ruta</h2>
        
        <div class="header-info">
            <strong>Mes:</strong> <input type="text" id="displayMonth" class="clean-input" value="Febrero 2026"><br>
            <strong>Nombre:</strong> <input type="text" class="clean-input" value="Marcos Méndez"><br>
            <strong>Cargo:</strong> <input type="text" class="clean-input" value="Conductor"><br>
            <strong>Empresa:</strong> <input type="text" class="clean-input" value="Transportes Uribe"><br>
            <strong>Jornada:</strong> <input type="text" class="clean-input" value="Lunes a Viernes">
        </div>

        <table>
            <thead>
                <tr>
                    <th width="15%">Fecha</th>
                    <th width="20%">Día</th>
                    <th width="30%">Ruta</th>
                    <th width="35%">Estado</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

    <script>
        const daysInSpanish = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
        const monthsInSpanish = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];

        function setInitialMonth() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            document.getElementById('monthPicker').value = `${year}-${month}`;
            generateTable();
        }

        function generateTable() {
            const monthPicker = document.getElementById('monthPicker').value;
            if (!monthPicker) return;

            const [year, month] = monthPicker.split('-');
            const date = new Date(year, month - 1, 1);
            const totalDays = new Date(year, month, 0).getDate();
            
            // Actualizar el título del mes
            document.getElementById('displayMonth').value = `${monthsInSpanish[date.getMonth()]} ${year}`;

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            for (let i = 1; i <= totalDays; i++) {
                const currentDate = new Date(year, month - 1, i);
                const dayOfWeek = currentDate.getDay();
                const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
                
                const tr = document.createElement('tr');
                if (isWeekend) tr.className = 'weekend';

                // Valores por defecto
                const routeValue = isWeekend ? '-' : 'San Miguel';
                
                // Opciones del select de estado
                const statusOptions = `
                    <option value="Presente" ${!isWeekend ? 'selected' : ''}>Presente</option>
                    <option value="Descanso" ${isWeekend ? 'selected' : ''}>Descanso</option>
                    <option value="Ausente">Ausente</option>
                    <option value="Feriado">Feriado</option>
                `;

                tr.innerHTML = `
                    <td>${String(i).padStart(2, '0')}-${month}</td>
                    <td>${daysInSpanish[dayOfWeek]}</td>
                    <td><input type="text" value="${routeValue}"></td>
                    <td>
                        <select>
                            ${statusOptions}
                        </select>
                    </td>
                `;
                tbody.appendChild(tr);
            }
        }

        function exportToImage() {
            const element = document.getElementById('document-container');
            const btn = document.querySelector('.btn-export');
            
            // Efecto visual de cargando
            btn.innerText = "Generando...";
            btn.style.backgroundColor = "#6c757d";

            html2canvas(element, { scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Asistencia_${document.getElementById('displayMonth').value}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                // Restaurar botón
                btn.innerText = "Exportar Imagen";
                btn.style.backgroundColor = "#28a745";
            });
        }

        // Cargar el mes actual al iniciar
        setInitialMonth();
    </script>

</body>
</html>
