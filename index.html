<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mi Asistencia</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'media' }
  </script>

  <style>
    body { 
      margin: 0; 
      font-family: system-ui, -apple-system, Roboto, sans-serif; 
      background-color: #f9fafb; 
      -webkit-tap-highlight-color: transparent; 
      user-select: none;
    }
    @media (prefers-color-scheme: dark) { 
      body { background-color: #0d1117; color: #f3f4f6; } 
    }
    input, textarea { user-select: text; }
    
    /* Utilidad para ocultar elementos */
    .hidden { display: none !important; }
  </style>
</head>
<body class="p-2 sm:p-4 pb-10">

  <div class="max-w-md mx-auto space-y-4">
    
    <!-- Encabezado -->
    <header class="bg-white dark:bg-[#161b22] p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 flex items-center gap-3">
      <div class="p-3 bg-[#39d353]/10 text-[#39d353] rounded-full shrink-0">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <div class="flex-1 min-w-0">
        <input 
          id="workerNameInput"
          type="text" 
          class="w-full text-lg font-bold bg-transparent focus:outline-none focus:border-b-2 focus:border-[#39d353] text-gray-900 dark:text-white truncate"
          placeholder="Tu Nombre"
        />
        <p class="text-xs text-gray-500 truncate">Registro de Días y Rutas</p>
      </div>
    </header>

    <!-- Navegación y Resumen -->
    <div class="bg-white dark:bg-[#161b22] p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 space-y-4">
      <div class="flex items-center justify-between">
        <button id="btnPrevMonth" class="p-2 rounded-full bg-gray-100 dark:bg-[#0d1117] active:bg-gray-200 dark:active:bg-gray-800">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <div id="monthLabel" class="text-center font-bold text-lg capitalize"></div>
        <button id="btnNextMonth" class="p-2 rounded-full bg-gray-100 dark:bg-[#0d1117] active:bg-gray-200 dark:active:bg-gray-800">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </div>

      <div class="flex items-center justify-between bg-gray-50 dark:bg-[#0d1117] p-3 rounded-xl">
        <div>
          <p class="text-xs font-medium text-gray-500">Progreso mensual</p>
          <p class="text-2xl font-black text-[#39d353]">
            <span id="workedCountLabel">0</span> <span class="text-sm font-normal text-gray-400">/ <span id="laborableDaysLabel">0</span> d</span>
          </p>
        </div>
        <div class="h-14 w-14 rounded-full border-[3px] border-[#39d353]/20 flex items-center justify-center bg-white dark:bg-[#161b22]">
          <span id="percentageLabel" class="text-[#39d353] font-bold text-sm">0%</span>
        </div>
      </div>
    </div>

    <!-- Calendario -->
    <div class="bg-white dark:bg-[#161b22] p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800">
      <div class="grid grid-cols-7 mb-2 text-center font-bold text-xs mb-2">
        <div class="text-gray-500">Lu</div>
        <div class="text-gray-500">Ma</div>
        <div class="text-gray-500">Mi</div>
        <div class="text-gray-500">Ju</div>
        <div class="text-gray-500">Vi</div>
        <div class="text-gray-400/60">Sá</div>
        <div class="text-gray-400/60">Do</div>
      </div>

      <div id="calendarGrid" class="grid grid-cols-7 gap-1.5 sm:gap-2">
        <!-- Los días se generan con JS -->
      </div>
      
      <div class="mt-4 flex flex-wrap justify-center gap-3 text-xs text-gray-500">
        <div class="flex items-center gap-1">
          <div class="w-3 h-3 rounded-sm border border-dashed border-gray-400"></div> Libre
        </div>
        <div class="flex items-center gap-1">
          <div class="w-3 h-3 rounded-sm bg-[#39d353]"></div> Trabajado
        </div>
        <div class="flex items-center gap-1">
          <div class="w-2 h-2 rounded-full bg-blue-500"></div> Ruta guardada
        </div>
      </div>
    </div>

    <!-- Botones de Acción -->
    <div class="flex flex-col gap-3">
      <button id="btnExport" class="w-full flex justify-center items-center gap-2 p-3.5 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-xl font-bold active:bg-blue-100 transition-colors">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
        Exportar Imagen del Año
      </button>
      <button id="btnClearAsk" class="w-full flex justify-center items-center gap-2 p-3.5 bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 rounded-xl font-bold active:bg-red-100 transition-colors">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        Borrar este mes
      </button>
    </div>

  </div>

  <!-- MODALES (Ocultos por defecto) -->
  
  <!-- Modal Limpiar -->
  <div id="modalClear" class="hidden fixed inset-0 bg-black/60 flex items-end sm:items-center justify-center z-50 p-4">
    <div class="bg-white dark:bg-[#161b22] w-full max-w-sm rounded-2xl p-6 mb-4 shadow-xl">
      <h3 class="text-xl font-bold mb-2 text-gray-900 dark:text-white">¿Limpiar mes?</h3>
      <p class="text-gray-500 mb-6 text-sm">Se borrarán todas las asistencias y rutas del mes actual.</p>
      <div class="flex gap-3">
        <button id="btnCancelClear" class="flex-1 py-3 bg-gray-100 dark:bg-gray-800 text-gray-900 dark:text-white rounded-xl font-bold">Cancelar</button>
        <button id="btnConfirmClear" class="flex-1 py-3 bg-red-500 text-white rounded-xl font-bold">Borrar</button>
      </div>
    </div>
  </div>

  <!-- Modal Detalle Día -->
  <div id="modalDay" class="hidden fixed inset-0 bg-black/60 flex items-end justify-center z-50 sm:p-4">
    <div class="bg-white dark:bg-[#161b22] w-full max-w-md rounded-t-3xl sm:rounded-2xl p-5 shadow-2xl max-h-[90vh] overflow-y-auto pb-8">
      <div class="w-12 h-1.5 bg-gray-200 dark:bg-gray-700 rounded-full mx-auto mb-4 sm:hidden"></div>

      <div class="flex justify-between items-center mb-5">
        <h3 id="modalDayTitle" class="text-xl font-bold text-gray-900 dark:text-white"></h3>
        <button id="btnCloseModalDay" class="bg-gray-100 dark:bg-gray-800 text-gray-500 p-2 rounded-full">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      
      <div class="space-y-5">
        <div class="bg-gray-50 dark:bg-[#0d1117] p-4 rounded-2xl border border-gray-100 dark:border-gray-800">
          <p class="font-medium text-sm text-gray-500 mb-3">¿Asististe a trabajar?</p>
          <button id="btnToggleWork" class="w-full py-3.5 rounded-xl font-bold text-lg transition-all active:scale-95 bg-gray-200 dark:bg-gray-800 text-gray-500 dark:text-gray-400">
            No
          </button>
        </div>

        <div class="space-y-2">
          <div class="flex justify-between items-end">
            <label class="font-bold flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
              <svg width="16" height="16" class="text-[#39d353]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
              Ruta / Observación
            </label>
            <button id="btnCopyYesterday" class="hidden text-xs flex items-center gap-1 text-blue-600 bg-blue-50 dark:bg-blue-900/30 px-2 py-1.5 rounded-lg font-bold">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg> Pegar de ayer
            </button>
          </div>
          <textarea id="dayDetailInput" class="w-full p-4 bg-gray-50 dark:bg-[#0d1117] border border-gray-200 dark:border-gray-800 rounded-2xl focus:ring-2 focus:ring-[#39d353] outline-none resize-none h-28 text-base text-gray-900 dark:text-white" placeholder="Escribe aquí los detalles de la ruta..."></textarea>
        </div>

        <button id="btnSaveDay" class="w-full py-4 bg-[#39d353] text-gray-900 rounded-2xl font-black text-lg active:scale-95 transition-transform shadow-lg shadow-[#39d353]/30">
          Guardar
        </button>
      </div>
    </div>
  </div>

  <!-- SCRIPT PRINCIPAL EN JAVASCRIPT PURO -->
  <script>
    // 1. ESTADO DE LA APLICACIÓN
    let currentDate = new Date();
    let workedDays = JSON.parse(localStorage.getItem('app-workedDays')) || {};
    let dayDetails = JSON.parse(localStorage.getItem('app-dayDetails')) || {};
    let workerName = localStorage.getItem('app-workerName') || 'Nombre';
    let activeModalDateKey = null;

    const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
    const shortDayNames = ['Lu', 'Ma', 'Mi', 'Ju', 'Vi', 'Sá', 'Do'];

    // 2. REFERENCIAS AL DOM
    const elWorkerName = document.getElementById('workerNameInput');
    const elMonthLabel = document.getElementById('monthLabel');
    const elGrid = document.getElementById('calendarGrid');
    const elWorkedCount = document.getElementById('workedCountLabel');
    const elLaborableDays = document.getElementById('laborableDaysLabel');
    const elPercentage = document.getElementById('percentageLabel');
    
    // Modales
    const modalClear = document.getElementById('modalClear');
    const modalDay = document.getElementById('modalDay');
    
    // Detalle de día
    const elModalDayTitle = document.getElementById('modalDayTitle');
    const btnToggleWork = document.getElementById('btnToggleWork');
    const elDayDetailInput = document.getElementById('dayDetailInput');
    const btnCopyYesterday = document.getElementById('btnCopyYesterday');

    // 3. FUNCIONES AUXILIARES
    const pad = n => n < 10 ? '0' + n : n;
    const formatDateKey = (y, m, d) => `${y}-${pad(m + 1)}-${pad(d)}`;
    
    const saveToLocal = () => {
      localStorage.setItem('app-workedDays', JSON.stringify(workedDays));
      localStorage.setItem('app-dayDetails', JSON.stringify(dayDetails));
      localStorage.setItem('app-workerName', workerName);
    };

    const getFirstDayAdapted = (y, m) => {
      let day = new Date(y, m, 1).getDay();
      return day === 0 ? 6 : day - 1; // Lunes = 0, Domingo = 6
    };

    // 4. RENDERIZAR CALENDARIO Y ESTADÍSTICAS
    const renderApp = () => {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDay = getFirstDayAdapted(year, month);
      
      const today = new Date();

      elWorkerName.value = workerName;
      elMonthLabel.textContent = `${monthNames[month]} ${year}`;

      // Limpiar grid
      elGrid.innerHTML = '';

      // Celdas vacías
      for (let i = 0; i < firstDay; i++) {
        const div = document.createElement('div');
        div.className = 'h-12 border border-transparent';
        elGrid.appendChild(div);
      }

      let laborableCount = 0;
      let workedCount = 0;

      // Días del mes
      for (let day = 1; day <= daysInMonth; day++) {
        const dateKey = formatDateKey(year, month, day);
        const dayOfWeekPos = (firstDay + day - 1) % 7;
        const isWeekend = dayOfWeekPos === 5 || dayOfWeekPos === 6;
        
        const isWorked = workedDays[dateKey];
        const hasDetail = dayDetails[dateKey] && dayDetails[dateKey].trim() !== '';
        const isToday = day === today.getDate() && month === today.getMonth() && year === today.getFullYear();

        if (!isWeekend) laborableCount++;
        if (isWorked) workedCount++;

        const btn = document.createElement('button');
        
        // Estilos base
        let classes = 'relative h-12 w-full rounded-lg flex items-center justify-center text-base sm:text-lg font-bold transition-transform active:scale-95 ';
        
        // Colores según estado
        if (isWorked) {
          classes += 'bg-[#39d353] text-gray-900 shadow-md ';
        } else if (isWeekend) {
          classes += 'border border-dashed border-gray-300 dark:border-gray-700 text-gray-400 dark:text-gray-600 ';
        } else {
          classes += 'bg-white dark:bg-[#161b22] border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 shadow-sm ';
        }

        if (isToday && !isWorked) {
          classes += 'ring-2 ring-blue-500 ring-offset-1 dark:ring-offset-[#0d1117] ';
        }

        btn.className = classes;
        btn.innerHTML = `${day}`;

        // Indicadores (Puntito azul ruta, Puntito blanco/azul hoy)
        if (hasDetail) {
          btn.innerHTML += `<span class="absolute top-1 right-1 w-2 h-2 rounded-full bg-blue-500 border border-white dark:border-[#161b22]"></span>`;
        }
        if (isToday) {
          btn.innerHTML += `<span class="absolute bottom-1 w-1 h-1 rounded-full ${isWorked ? 'bg-white' : 'bg-blue-500'}"></span>`;
        }

        // Evento abrir modal
        btn.onclick = () => openDayModal(year, month, day);

        elGrid.appendChild(btn);
      }

      // Actualizar estadísticas
      elWorkedCount.textContent = workedCount;
      elLaborableDays.textContent = laborableCount;
      const percentage = laborableCount === 0 ? 0 : Math.round((workedCount / laborableCount) * 100);
      elPercentage.textContent = `${percentage}%`;
    };

    // 5. LÓGICA DE NAVEGACIÓN
    document.getElementById('btnPrevMonth').onclick = () => {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderApp();
    };
    document.getElementById('btnNextMonth').onclick = () => {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderApp();
    };
    elWorkerName.oninput = (e) => {
      workerName = e.target.value;
      saveToLocal();
    };

    // 6. LÓGICA DEL MODAL DE DÍA
    const openDayModal = (y, m, d) => {
      activeModalDateKey = formatDateKey(y, m, d);
      elModalDayTitle.textContent = `${d} de ${monthNames[m]} ${y}`;
      
      // Estado de trabajo
      updateToggleBtnUI(workedDays[activeModalDateKey]);
      
      // Texto detalle
      elDayDetailInput.value = dayDetails[activeModalDateKey] || '';

      // Evaluar botón "Copiar Ayer"
      const datePrev = new Date(y, m, d);
      datePrev.setDate(datePrev.getDate() - 1);
      const prevKey = formatDateKey(datePrev.getFullYear(), datePrev.getMonth(), datePrev.getDate());
      
      if (dayDetails[prevKey] && dayDetails[prevKey].trim() !== '') {
        btnCopyYesterday.classList.remove('hidden');
        btnCopyYesterday.onclick = () => { elDayDetailInput.value = dayDetails[prevKey]; };
      } else {
        btnCopyYesterday.classList.add('hidden');
      }

      modalDay.classList.remove('hidden');
    };

    const updateToggleBtnUI = (isWorked) => {
      if (isWorked) {
        btnToggleWork.className = 'w-full py-3.5 rounded-xl font-bold text-lg transition-all active:scale-95 bg-[#39d353] text-gray-900 shadow-md';
        btnToggleWork.textContent = '✅ Sí, trabajado';
      } else {
        btnToggleWork.className = 'w-full py-3.5 rounded-xl font-bold text-lg transition-all active:scale-95 bg-gray-200 dark:bg-gray-800 text-gray-500 dark:text-gray-400';
        btnToggleWork.textContent = 'No';
      }
    };

    btnToggleWork.onclick = () => {
      // Toggle temporal en UI
      const currentState = workedDays[activeModalDateKey];
      workedDays[activeModalDateKey] = !currentState;
      updateToggleBtnUI(workedDays[activeModalDateKey]);
    };

    document.getElementById('btnSaveDay').onclick = () => {
      dayDetails[activeModalDateKey] = elDayDetailInput.value;
      saveToLocal();
      modalDay.classList.add('hidden');
      renderApp();
    };

    document.getElementById('btnCloseModalDay').onclick = () => modalDay.classList.add('hidden');

    // 7. LÓGICA DE LIMPIAR MES
    document.getElementById('btnClearAsk').onclick = () => modalClear.classList.remove('hidden');
    document.getElementById('btnCancelClear').onclick = () => modalClear.classList.add('hidden');
    document.getElementById('btnConfirmClear').onclick = () => {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      
      for (let i = 1; i <= daysInMonth; i++) {
        const key = formatDateKey(year, month, i);
        delete workedDays[key];
        delete dayDetails[key];
      }
      saveToLocal();
      modalClear.classList.add('hidden');
      renderApp();
    };

    // 8. EXPORTAR A CANVAS (IMAGEN)
    document.getElementById('btnExport').onclick = () => {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const scale = 2;
      const width = 800; 
      const year = currentDate.getFullYear();
      
      const yearDetailsEntries = Object.keys(dayDetails)
        .filter(k => k.startsWith(year.toString()) && dayDetails[k] && dayDetails[k].trim() !== '')
        .sort();
      
      const baseHeight = 1060;
      const detailsHeight = yearDetailsEntries.length > 0 ? (yearDetailsEntries.length * 25 + 80) : 0;
      const height = baseHeight + detailsHeight; 
      
      canvas.width = width * scale;
      canvas.height = height * scale;
      ctx.scale(scale, scale);
      
      // Fondo
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, width, height);
      
      // Título
      ctx.fillStyle = '#111827';
      ctx.font = 'bold 28px system-ui, -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(`Reporte Anual: ${workerName} - ${year}`, width / 2, 60);
      
      const totalWorkedYear = Object.keys(workedDays).filter(k => k.startsWith(year.toString()) && workedDays[k]).length;
      ctx.font = '18px system-ui, -apple-system, sans-serif';
      ctx.fillStyle = '#4B5563';
      ctx.fillText(`Total de días trabajados: ${totalWorkedYear}`, width / 2, 95);
      
      ctx.beginPath();
      ctx.moveTo(50, 120);
      ctx.lineTo(750, 120);
      ctx.strokeStyle = '#E5E7EB';
      ctx.stroke();

      const startX = 55, startY = 160, colWidth = 235, rowHeight = 210, cellSize = 24, cellGap = 4;
      
      const drawRoundRect = (x, y, w, h, r, isStrokeMode = false) => {
        ctx.beginPath();
        ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ct
