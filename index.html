<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consola de Reportes de Asistencia</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #eef2f5;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
        }

        /* Paneles de Control */
        .main-controls {
            width: 100%;
            max-width: 900px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .control-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .control-row:last-child { margin-bottom: 0; }

        .control-group-title {
            font-size: 14px;
            font-weight: bold;
            color: #555;
            width: 100%;
            margin-bottom: 5px;
            border-bottom: 1px solid #eee;
            padding-bottom: 3px;
        }

        input[type="month"] {
            flex: 1;
            min-width: 150px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
        }

        button {
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Colores Botones */
        .btn-main { background-color: #007bff; color: white; }
        .btn-main:hover { background-color: #0069d9; }

        .btn-success { background-color: #28a745; color: white; margin-left: auto;}
        .btn-success:hover { background-color: #218838; }

        .btn-tools { background-color: #6c757d; color: white; padding: 8px 12px; font-size: 13px;}
        .btn-tools:hover { background-color: #5a6268; }

        .btn-danger { background-color: #dc3545; color: white; padding: 8px 12px; font-size: 13px;}
        .btn-danger:hover { background-color: #c82333; }


        /* Contenedor del Documento (Simulación Word) */
        #document-container {
            background: white;
            padding: 40px 30px;
            border-radius: 2px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 900px;
            box-sizing: border-box;
            position: relative;
            
            /* Layout de dos columnas */
            display: flex;
            gap: 25px;
        }

        /* Columna Izquierda (Imagen) */
        #doc-left-col {
            width: 25%; /* Ancho fijo para la columna de imagen */
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative; /* Para mover la imagen dentro */
        }

        #image-placeholder {
            width: 100%;
            height: 150px;
            border: 2px dashed #ccc;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 13px;
            text-align: center;
            background: #fafafa;
        }

        #uploaded-image {
            display: none; /* Oculto hasta que se suba */
            max-width: 100%; /* No salir de su columna */
            height: auto;
            position: relative; /* Permite mover arriba/abajo */
            transition: width 0.1s ease, top 0.1s ease;
        }

        /* Columna Derecha (Contenido) */
        #doc-right-col {
            width: 75%;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            color: #333;
            text-transform: uppercase;
            font-size: 19px;
            margin-bottom: 20px;
        }

        .header-info {
            margin-bottom: 25px;
            font-size: 14px;
            line-height: 1.5;
        }
        .header-info strong {
            display: inline-block;
            width: 70px;
            color: #555;
        }

        /* Inputs invisibles */
        input.clean-input {
            border: none;
            border-bottom: 1px dashed transparent;
            background: transparent;
            font-size: 14px;
            font-family: inherit;
            color: #000;
            width: calc(100% - 80px);
            outline: none;
            padding: 2px;
        }
        input.clean-input:focus, input.clean-input:hover {
            border-bottom: 1px dashed #999;
            background: #fdfdfd;
        }

        /* Tabla */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th, td {
            border: 1px solid #000;
            padding: 5px;
            text-align: left;
            vertical-align: top;
        }
        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
        
        .editable-cell {
            width: 100%;
            min-height: 18px;
            outline: none;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .editable-cell:hover, .editable-cell:focus {
            background: #f9f9f9;
        }

        td select {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            padding: 0;
            cursor: pointer;
        }
        .weekend {
            background-color: #fbfbfb;
            color: #777;
            font-style: italic;
        }

        /* Ocultar input file nativo */
        #fileInput { display: none; }
    </style>
</head>
<body>

    <div class="main-controls">
        
        <div class="control-row">
            <div class="control-group-title">Configuración del Reporte</div>
            <input type="month" id="monthPicker" onchange="generateTable()">
            <button class="btn-success" onclick="exportToImage()">
                💾 Exportar como Imagen
            </button>
        </div>

        <div class="control-row">
            <div class="control-group-title">Herramientas de Imagen (Columna Izquierda)</div>
            
            <input type="file" id="fileInput" accept="image/*" onchange="handleImageUpload(this)">
            <button class="btn-main" onclick="triggerFileInput()">📁 Subir Imagen</button>
            <button class="btn-danger" id="btnRemoveImg" onclick="removeImage()" style="display:none;">🗑️ Quitar</button>
            
            <span style="margin-left: 15px; font-size: 13px; color: #666;">Posición Y:</span>
            <button class="btn-tools" onclick="moveImage(-10)">↑ Subir</button>
            <button class="btn-tools" onclick="moveImage(10)">↓ Bajar</button>
            
            <span style="margin-left: 15px; font-size: 13px; color: #666;">Tamaño:</span>
            <button class="btn-tools" onclick="resizeImage(10)">🔍 +10%</button>
            <button class="btn-tools" onclick="resizeImage(-10)">🔎 -10%</button>
            <span id="sizeStatus" style="font-size: 12px; color: #888;">(100%)</span>
        </div>
    </div>

    <div id="document-container">
        
        <div id="doc-left-col">
            <div id="image-placeholder">Espacio para<br>Imagen/Logo</div>
            <img id="uploaded-image" src="" alt="Logo Reporte">
        </div>

        <div id="doc-right-col">
            <h2>Registro de Asistencia y Ruta</h2>
            
            <div class="header-info">
                <strong>Mes:</strong> <input type="text" id="displayMonth" class="clean-input" value=""><br>
                <strong>Nombre:</strong> <input type="text" class="clean-input" value="Marcos Méndez"><br>
                <strong>Cargo:</strong> <input type="text" class="clean-input" value="Conductor"><br>
                <strong>Empresa:</strong> <input type="text" class="clean-input" value="Transportes Uribe"><br>
                <strong>Jornada:</strong> <input type="text" class="clean-input" value="Lunes a Viernes">
            </div>

            <table>
                <thead>
                    <tr>
                        <th width="15%">Fecha</th>
                        <th width="18%">Día</th>
                        <th width="42%">Ruta</th>
                        <th width="25%">Estado</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>

    </div>

    <script>
        const daysInSpanish = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
        const monthsInSpanish = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
        
        // Estado de la imagen
        let imgScale = 100; // Porcentaje del ancho de la columna
        let imgTopValue = 0; // Píxeles desde arriba

        const imgElement = document.getElementById('uploaded-image');
        const placeholder = document.getElementById('image-placeholder');
        const btnRemove = document.getElementById('btnRemoveImg');
        const sizeStatus = document.getElementById('sizeStatus');

        function setInitialMonth() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            document.getElementById('monthPicker').value = `${year}-${month}`;
            generateTable();
        }

        function generateTable() {
            const monthPicker = document.getElementById('monthPicker').value;
            if (!monthPicker) return;

            const [year, month] = monthPicker.split('-');
            const date = new Date(year, month - 1, 1);
            const totalDays = new Date(year, month, 0).getDate();
            
            document.getElementById('displayMonth').value = `${monthsInSpanish[date.getMonth()]} ${year}`;

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            for (let i = 1; i <= totalDays; i++) {
                const currentDate = new Date(year, month - 1, i);
                const dayOfWeek = currentDate.getDay();
                const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
                
                const tr = document.createElement('tr');
                if (isWeekend) tr.className = 'weekend';

                const routeValue = isWeekend ? '-' : 'San Miguel';
                
                const statusOptions = `
                    <option value="Presente" ${!isWeekend ? 'selected' : ''}>Presente</option>
                    <option value="Descanso" ${isWeekend ? 'selected' : ''}>Descanso</option>
                    <option value="Ausente">Ausente</option>
                    <option value="Feriado">Feriado</option>
                `;

                tr.innerHTML = `
                    <td>${String(i).padStart(2, '0')}-${month}</td>
                    <td>${daysInSpanish[dayOfWeek]}</td>
                    <td><div contenteditable="true" class="editable-cell">${routeValue}</div></td>
                    <td><select>${statusOptions}</select></td>
                `;
                tbody.appendChild(tr);
            }
        }

        // --- FUNCIONES DE IMAGEN ---

        function triggerFileInput() {
            document.getElementById('fileInput').click();
        }

        function handleImageUpload(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    imgElement.src = e.target.result;
                    imgElement.style.display = 'block';
                    placeholder.style.display = 'none';
                    btnRemove.style.display = 'inline-flex';
                    
                    // Resetear controles al subir nueva
                    imgScale = 100;
                    imgTopValue = 0;
                    updateImageStyle();
                }
                
                reader.readAsDataURL(input.files[0]);
            }
        }

        function removeImage() {
            imgElement.src = '';
            imgElement.style.display = 'none';
            placeholder.style.display = 'flex';
            btnRemove.style.display = 'none';
            document.getElementById('fileInput').value = ''; // Limpiar input
        }

        function moveImage(delta) {
            if (imgElement.style.display === 'none') return;
            imgTopValue += delta;
            updateImageStyle();
        }

        function resizeImage(delta) {
            if (imgElement.style.display === 'none') return;
            imgScale += delta;
            // Límites lógicos (10% a 200%)
            if (imgScale < 10) imgScale = 10;
            if (imgScale > 200) imgScale = 200;
            updateImageStyle();
        }

        function updateImageStyle() {
            // Aplicar tamaño por porcentaje relativo a la columna izquierda
            imgElement.style.width = imgScale + '%';
            // Aplicar posición vertical
            imgElement.style.top = imgTopValue + 'px';
            // Actualizar texto de estado
            sizeStatus.innerText = `(${imgScale}%)`;
        }

        // --- EXPORTAR ---

        function exportToImage() {
            const element = document.getElementById('document-container');
            const btn = document.querySelector('.btn-success');
            
            btn.innerText = "⏳ Generando...";
            btn.style.backgroundColor = "#6c757d";

            // html2canvas captura el estado visual actual (incluyendo transforms y top)
            html2canvas(element, { 
                scale: 2, // Alta calidad
                logging: false,
                useCORS: true // Por si acaso hay imágenes externas
            }).then(canvas => {
                const link = document.createElement('a');
                const mesActual = document.getElementById('displayMonth').value.replace(/ /g, '_');
                link.download = `Reporte_Asistencia_${mesActual}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                btn.innerText = "💾 Exportar como Imagen";
                btn.style.backgroundColor = "#28a745";
            });
        }

        setInitialMonth();
    </script>

</body>
</html>
